<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Insta AI Detector Settings</title>
  <style>
    :root {
      --primary: #8b5cf6;
      --bg: #1e1e24;
      --text: #ffffff;
      --text-muted: #a1a1aa;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      width: 320px;
      margin: 0;
      padding: 0;
    }
    .header {
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .container {
      padding: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      border-color: var(--primary);
    }
    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }
    .btn-test {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-test:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .btn-test:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary);
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    .status {
      margin-top: 16px;
      font-size: 13px;
      display: none;
      text-align: center;
    }
    .status.success {
      color: #34d399; /* Success Green */
    }
    .status.error {
      color: #fca5a5; /* Error Red */
    }
    p.help {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 0;
      line-height: 1.4;
    }
    a {
      color: #bfdbfe;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Insta AI Detector</h1>
  </div>
  <div class="container">
    <div class="form-group">
      <label for="apiKey">Gemini API Key (Free)</label>
      <input type="password" id="apiKey" placeholder="AIzaSy...">
      <button id="testKeyBtn" class="btn-test">Test Key</button>
      <p class="help">Get a free key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
    </div>
    
    <div class="toggle-group">
      <label for="enableDetection" style="margin-bottom:0">Enable Detection</label>
      <label class="switch">
        <input type="checkbox" id="enableDetection" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div id="status" class="status">Saved!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
